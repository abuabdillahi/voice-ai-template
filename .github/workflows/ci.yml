name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # The `lint` job is added by issue 02 (running concurrently in a
  # separate worktree). When both PRs merge, `build` should be made to
  # depend on `lint` via `needs: [lint]`.
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: agent
            dockerfile: apps/agent/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          tags: voice-ai/${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
