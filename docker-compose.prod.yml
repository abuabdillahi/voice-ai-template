# Production compose stack.
#
# Adds the web (nginx) tier alongside the api + agent services. LiveKit
# itself is not in the service graph — both dev and prod dial a hosted
# LiveKit Cloud project (LIVEKIT_URL=wss://<project>.livekit.cloud) so
# the only deployment-shape difference is the nginx web image.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: voice-ai/api:prod
    env_file:
      - .env
    ports:
      - '8000:8000'
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    image: voice-ai/agent:prod
    env_file:
      - .env
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: voice-ai/web:prod
    ports:
      - '80:80'
    depends_on:
      - api
    restart: unless-stopped
