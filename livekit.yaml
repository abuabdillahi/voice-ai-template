# LiveKit server configuration for the production self-hosted stack.
#
# This file is mounted read-only into the `livekit-server` container by
# `docker-compose.prod.yml`. Keys and ports listed here MUST be kept in
# sync with the `.env` file the API and agent read.
#
# Production deployers should at minimum:
#   * replace the placeholder API key/secret with values matching .env
#   * narrow the UDP RTP port range to match their network plan
#   * configure TURN with a real shared_secret if clients sit behind
#     symmetric NATs

port: 7880
bind_addresses:
  - ''
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true

# The API key/secret pair. The agent worker authenticates with these
# (LIVEKIT_API_KEY / LIVEKIT_API_SECRET) and the API service signs
# user-facing tokens with the same secret. Keep both halves out of
# source control in real deployments.
keys:
  REPLACE_WITH_YOUR_API_KEY: REPLACE_WITH_YOUR_API_SECRET

# Optional TURN block. Uncomment and set a real shared_secret to relay
# media for clients on restrictive networks.
# turn:
#   enabled: true
#   domain: turn.example.com
#   tls_port: 5349
#   external_tls: true
#   credentials_file: /etc/livekit-turn-credentials.json

logging:
  level: info
  json: true
