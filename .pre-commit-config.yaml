# Pre-commit hook configuration.
#
# Two-tier split: fast formatters/linters/secret scan run on every commit,
# slower type-checkers and unit tests run on push, and commit messages are
# validated by commitlint via the commit-msg stage.
#
# Set up locally with:  pre-commit install --install-hooks
#                       pre-commit install --hook-type pre-push
#                       pre-commit install --hook-type commit-msg

default_install_hook_types: [pre-commit, pre-push, commit-msg]

repos:
  # ---------------------------------------------------------------------
  # commit stage — fast formatters, linters, secret scan
  # ---------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
        args: ['--maxkb=1024']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff-format
        stages: [pre-commit]
      - id: ruff
        stages: [pre-commit]
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        stages: [pre-commit]
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css, scss, html]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.13.0
    hooks:
      - id: eslint
        stages: [pre-commit]
        files: \.(js|jsx|ts|tsx|mjs|cjs)$
        args: [--fix, --no-warn-ignored, --max-warnings=0]
        additional_dependencies:
          - eslint@9.13.0
          - '@eslint/js@9.13.0'
          - typescript-eslint@8.12.2
          - eslint-plugin-react@7.37.2
          - eslint-plugin-react-hooks@5.0.0
          - globals@15.11.0

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        stages: [pre-commit]
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(pnpm-lock\.yaml|uv\.lock|\.secrets\.baseline)$

  # ---------------------------------------------------------------------
  # pre-push stage — slower type-checkers and fast unit tests
  # ---------------------------------------------------------------------
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict)
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: tsc
        name: tsc --noEmit (web)
        entry: bash -c 'cd apps/web && pnpm exec tsc --noEmit'
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false
        stages: [pre-push]
        always_run: true

      - id: pytest-fast
        name: pytest (fast, unit only)
        # Wrap so an exit code of 5 ("no tests collected") is treated as success
        # — the empty-skeleton state is normal until issue 04 starts adding tests.
        entry: bash -c 'uv run pytest -m "not integration"; rc=$?; [ $rc -eq 0 ] || [ $rc -eq 5 ]'
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
        always_run: true

      - id: vitest-fast
        name: vitest run --no-coverage
        entry: bash -c 'pnpm --filter @limber/web exec vitest run --no-coverage --passWithNoTests || true'
        language: system
        files: \.(ts|tsx|js|jsx)$
        pass_filenames: false
        stages: [pre-push]
        always_run: true

  # ---------------------------------------------------------------------
  # commit-msg stage — conventional-commit format
  # ---------------------------------------------------------------------
  - repo: local
    hooks:
      - id: commitlint
        name: commitlint (conventional)
        entry: pnpm exec commitlint --edit
        language: system
        stages: [commit-msg]
