# Production nginx config for the web tier.
#
# - Serves the Vite-built SPA from /usr/share/nginx/html with a fallback
#   to index.html so client-side routes refresh cleanly.
# - Reverse-proxies /api/* to the api service on the docker network so
#   port 8000 doesn't need to be exposed to the public internet.
# - Terminates TLS using a Cloudflare Origin Certificate mounted at
#   /etc/nginx/certs (set Cloudflare SSL/TLS mode to Full (strict)).
# - server_name is a catch-all; the Origin Certificate's SAN list
#   constrains which hostnames Cloudflare will route here.

server {
  listen 80 default_server;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl default_server;
  http2 on;
  server_name _;

  ssl_certificate     /etc/nginx/certs/origin.pem;
  ssl_certificate_key /etc/nginx/certs/origin.key;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass         http://api:8000/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
